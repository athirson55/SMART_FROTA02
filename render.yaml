services:
  - type: web
    name: smart-frota-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-frota-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_NAME
        value: Smart Frota API
      - key: ENVIRONMENT
        value: production
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        value: "https://athirson55.github.io"
      - key: AUTO_CREATE_TABLES
        value: "true"
      - key: SEED_ON_STARTUP
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM_NAME
        value: "Smart Frota"
      - key: EMAIL_VERIFY_EXPIRE_HOURS
        value: "24"
      - key: RATE_LIMIT_AUTH
        value: "10/minute"

databases:
  - name: smart-frota-db
    databaseName: smartfrota
    user: smartfrota
    plan: free
