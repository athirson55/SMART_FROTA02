services:
  - type: web
    name: smart-frota-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # DATABASE_URL é automaticamente preenchida a partir do banco gerenciado
      # pelo Render. Se a variável não estiver definida no ambiente, a app
      # usará o valor padrão (localhost) e falhará com erro de conexão.
      - key: DATABASE_URL
        fromDatabase:
          name: smart-frota-db
          property: connectionString
        # Nota: não insira a connection string diretamente no YAML com credenciais.
        # Use o painel do Render para revisar/fornecer a variável se necessário.
      - key: SECRET_KEY
        generateValue: true
      - key: APP_NAME
        value: Smart Frota API
      - key: ENVIRONMENT
        value: production
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        value: "https://athirson55.github.io"
      - key: FRONTEND_URL
        value: "https://athirson55.github.io/SMART_FROTA02"
      - key: AUTO_CREATE_TABLES
        value: "true"
      - key: SEED_ON_STARTUP
        value: "false"
      # EMAIL PROVIDER (produção): configurar aqui a chave Resend (preferido)
      # ou as variáveis SMTP abaixo via Render -> Environment (NÃO commitar valores secretos).
      # Exemplo: Key=RESEND_API_KEY, Value=sk_...  (defina no painel do Render)
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM_NAME
        value: "Smart Frota"
      - key: EMAIL_VERIFY_EXPIRE_HOURS
        value: "24"
      - key: RATE_LIMIT_AUTH
        value: "10/minute"

databases:
  - name: smart-frota-db
    databaseName: smartfrota
    user: smartfrota
    plan: free
